name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: Frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  backend-sanity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: Backend/package.json

      - name: Install dependencies
        run: npm install

      - name: Syntax check stray-report module
        run: node -e "require('./models/StrayReport'); require('./controllers/strayReportController'); require('./routes/strayReport'); console.log('Stray report module loaded successfully')"
