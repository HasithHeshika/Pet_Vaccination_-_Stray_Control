<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="pawPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Paw print 1 -->
      <g opacity="0.1" fill="white">
        <circle cx="30" cy="30" r="8"/>
        <circle cx="20" cy="40" r="5"/>
        <circle cx="30" cy="45" r="5"/>
        <circle cx="40" cy="40" r="5"/>
        <ellipse cx="30" cy="55" rx="10" ry="12"/>
      </g>
      
      <!-- Paw print 2 -->
      <g opacity="0.08" fill="white">
        <circle cx="70" cy="70" r="6"/>
        <circle cx="62" cy="78" r="4"/>
        <circle cx="70" cy="82" r="4"/>
        <circle cx="78" cy="78" r="4"/>
        <ellipse cx="70" cy="90" rx="8" ry="10"/>
      </g>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#pawPattern)"/>
</svg>
